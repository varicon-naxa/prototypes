<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Export Site Diary</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #F4F5F7;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #FFFFFF;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.07), 0 10px 40px rgba(0,0,0,0.12);
      width: 100%;
      max-width: 480px;
      overflow: hidden;
    }

    /* Header */
    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 24px;
      border-bottom: 1px solid #E5E7EB;
    }

    .card-header h2 {
      font-size: 16px;
      font-weight: 700;
      color: #1A2332;
    }

    .btn-back {
      display: flex;
      align-items: center;
      gap: 6px;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      color: #6B7280;
      padding: 4px 8px;
      border-radius: 6px;
      transition: background 0.15s;
    }
    .btn-back:hover { background: #F4F5F7; color: #1A2332; }

    /* Body */
    .card-body {
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .field-label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    /* Date input */
    .date-input-wrap {
      position: relative;
    }
    .date-input-wrap svg {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: #9CA3AF;
      pointer-events: none;
    }
    .date-input {
      width: 100%;
      height: 40px;
      border: 1px solid #E5E7EB;
      border-radius: 6px;
      padding: 0 12px 0 38px;
      font-family: inherit;
      font-size: 13px;
      color: #374151;
      background: #fff;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .date-input:focus {
      border-color: #F5A623;
      box-shadow: 0 0 0 3px rgba(245,166,35,0.15);
    }

    /* Status select */
    .select-wrap {
      position: relative;
    }
    .select-wrap svg {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: #6B7280;
      pointer-events: none;
    }
    .status-select {
      width: 100%;
      height: 40px;
      border: 1px solid #E5E7EB;
      border-radius: 6px;
      padding: 0 36px 0 12px;
      font-family: inherit;
      font-size: 13px;
      color: #374151;
      background: #fff;
      appearance: none;
      outline: none;
      cursor: pointer;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .status-select:focus {
      border-color: #F5A623;
      box-shadow: 0 0 0 3px rgba(245,166,35,0.15);
    }

    /* Export format */
    .format-options {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .radio-option {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
    }

    .radio-option input[type="radio"] {
      appearance: none;
      width: 18px;
      height: 18px;
      border: 2px solid #D1D5DB;
      border-radius: 50%;
      flex-shrink: 0;
      cursor: pointer;
      position: relative;
      transition: border-color 0.15s;
    }
    .radio-option input[type="radio"]:checked {
      border-color: #F5A623;
    }
    .radio-option input[type="radio"]:checked::after {
      content: '';
      position: absolute;
      width: 8px;
      height: 8px;
      background: #F5A623;
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    .radio-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 500;
      color: #374151;
    }

    .format-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.03em;
    }
    .format-icon.excel { background: #D1FAE5; color: #065F46; }
    .format-icon.pdf   { background: #FEE2E2; color: #991B1B; }

    /* Footer */
    .card-footer {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px 24px;
      border-top: 1px solid #E5E7EB;
      background: #F9FAFB;
    }

    .btn-preview {
      display: flex;
      align-items: center;
      gap: 6px;
      height: 36px;
      padding: 0 14px;
      border: 1px solid #E5E7EB;
      border-radius: 6px;
      background: #fff;
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      color: #374151;
      cursor: pointer;
      transition: background 0.15s;
      margin-right: auto;
    }
    .btn-preview:hover { background: #F4F5F7; }

    .btn-cancel {
      height: 36px;
      padding: 0 16px;
      border: 1px solid #E5E7EB;
      border-radius: 6px;
      background: #fff;
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      color: #374151;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-cancel:hover { background: #F4F5F7; }

    .btn-export {
      display: flex;
      align-items: center;
      gap: 6px;
      height: 36px;
      padding: 0 18px;
      border: none;
      border-radius: 6px;
      background: #F5A623;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      color: #fff;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-export:hover { background: #D4891A; }
    .btn-export:active { transform: scale(0.98); }
  </style>
</head>
<body>

  <div class="card">

    <!-- Header -->
    <div class="card-header">
      <h2>Export Site Diary</h2>
      <button class="btn-back" onclick="history.back()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
        Close
      </button>
    </div>

    <!-- Body -->
    <div class="card-body">

      <!-- Date Range -->
      <div>
        <label class="field-label" for="export-date">Date Range</label>
        <div class="date-input-wrap">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
            <line x1="16" y1="2" x2="16" y2="6"/>
            <line x1="8" y1="2" x2="8" y2="6"/>
            <line x1="3" y1="10" x2="21" y2="10"/>
          </svg>
          <input type="date" class="date-input" id="export-date" />
        </div>
      </div>

      <!-- Status -->
      <div>
        <label class="field-label" for="export-status">Status</label>
        <div class="select-wrap">
          <select class="status-select" id="export-status">
            <option value="all">All</option>
            <option value="draft">Draft</option>
            <option value="submitted">Submitted</option>
            <option value="approved">Approved</option>
          </select>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </div>
      </div>

      <!-- Export Format -->
      <div>
        <label class="field-label">Export Format</label>
        <div class="format-options">
          <label class="radio-option">
            <input type="radio" name="export-fmt" value="excel" checked />
            <span class="radio-label">
              <span class="format-icon excel">XLS</span>
              Excel Spreadsheet (.xlsx)
            </span>
          </label>
          <label class="radio-option">
            <input type="radio" name="export-fmt" value="pdf" />
            <span class="radio-label">
              <span class="format-icon pdf">PDF</span>
              PDF Document (.pdf)
            </span>
          </label>
        </div>
      </div>

    </div>

    <!-- Footer -->
    <div class="card-footer">
      <button class="btn-preview" onclick="window.open('equipment-rollover-web.html', '_blank')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        Preview
      </button>
      <button class="btn-cancel" onclick="history.back()">Cancel</button>
      <button class="btn-export" onclick="doExport()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        Export
      </button>
    </div>

  </div>

  <script>
    // Pre-fill date with today
    (function () {
      const d = new Date();
      const pad = n => String(n).padStart(2, '0');
      document.getElementById('export-date').value =
        `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
    })();

    // Honour ?format= param when opened from the main app modal
    (function () {
      const fmt = new URLSearchParams(location.search).get('format');
      if (fmt) {
        const r = document.querySelector(`input[name="export-fmt"][value="${fmt}"]`);
        if (r) r.checked = true;
      }
    })();

    function showToast(msg) {
      let t = document.getElementById('_toast');
      if (!t) {
        t = document.createElement('div');
        t.id = '_toast';
        t.style.cssText = 'position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:#1A2332;color:#fff;font-size:13px;font-weight:500;padding:10px 20px;border-radius:6px;box-shadow:0 4px 16px rgba(0,0,0,0.18);z-index:9999;opacity:0;transition:opacity 0.2s ease;pointer-events:none;white-space:nowrap;';
        document.body.appendChild(t);
      }
      t.textContent = msg;
      t.style.opacity = '1';
      clearTimeout(t._hide);
      t._hide = setTimeout(() => { t.style.opacity = '0'; }, 2500);
    }

    function doExport() {
      const format = document.querySelector('input[name="export-fmt"]:checked').value.toUpperCase();
      showToast('Exporting as ' + format + '…');
    }
  </script>

</body>
</html>
