<!-- ────────── MANAGE NOTE SECTIONS ────────── -->
<div id="pg-manage-notes" class="vp" style="overflow:auto;padding:0;">
  <!-- Header -->
  <div style="display:flex;align-items:center;gap:10px;padding:14px 22px;border-bottom:1px solid var(--border);background:#fff;">
    <button class="ibtn" onclick="goPage('site-diary')" style="padding:5px;border-radius:6px;border:1px solid var(--border);">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="var(--tb)" stroke-width="1.6"><path d="M9 2L4 7L9 12"/></svg>
    </button>
    <h2 style="font-size:17px;font-weight:700;color:var(--tp);flex:1;">Manage Note Sections</h2>
    <button class="ibtn" onclick="goPage('site-diary')" style="padding:5px;">
      <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="var(--tm)" stroke-width="1.6"><path d="M4 4l8 8M12 4l-8 8"/></svg>
    </button>
  </div>

  <div style="padding:20px 22px;max-width:600px;">
    <!-- Info banner -->
    <div style="background:linear-gradient(135deg,#F0F7FF,#F8FAFF);border:1px solid #DBEAFE;border-radius:8px;padding:14px 16px;margin-bottom:22px;display:flex;gap:10px;align-items:flex-start;">
      <div style="width:28px;height:28px;border-radius:50%;background:#DBEAFE;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="#3B82F6" stroke-width="1.6"><circle cx="8" cy="8" r="7"/><path d="M8 7v4"/><circle cx="8" cy="5" r=".5" fill="#3B82F6"/></svg>
      </div>
      <div style="font-size:12px;color:var(--tb);line-height:1.6;">
        Notes can be managed under different topics (eg. Visitor's Log, Safety Updates, General Updates), here known as <strong>Note Section</strong>. Manage the note sections from below.
      </div>
    </div>

    <!-- Sections list -->
    <div id="manage-note-sections-list" style="margin-bottom:14px;"></div>

    <!-- Add section button -->
    <button class="btn btn-o" onclick="openAddNoteSectionDialog()" style="gap:5px;width:100%;justify-content:center;height:40px;border-style:dashed;border-color:var(--border-d);color:var(--tm);font-size:12px;transition:all .15s;"
            onmouseenter="this.style.borderColor='var(--amber)';this.style.color='var(--amber)';this.style.background='var(--amber-l)'"
            onmouseleave="this.style.borderColor='var(--border-d)';this.style.color='var(--tm)';this.style.background='#fff'">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2v8M2 6h8"/></svg>
      Add Note Section
    </button>
  </div>
</div>

<!-- ── Add/Edit Note Section Dialog ── -->
<div id="note-section-dialog" class="mo" style="display:none;" onclick="if(event.target===this)closeNoteSectionDialog()">
  <div class="mb" style="width:500px;max-width:92vw;border-radius:8px;overflow:hidden;">
    <!-- Dialog header -->
    <div style="display:flex;align-items:center;gap:10px;padding:16px 20px;border-bottom:1px solid var(--border);background:#fff;">
      <div style="width:32px;height:32px;border-radius:6px;background:var(--amber-l);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
        <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="var(--amber)" stroke-width="1.5"><rect x="2" y="1" width="12" height="14" rx="2"/><path d="M5 5h6M5 8h6M5 11h3"/></svg>
      </div>
      <div style="flex:1;">
        <h3 id="note-section-dialog-title" style="font-size:15px;font-weight:700;color:var(--tp);margin:0;">Add Note Section</h3>
        <div style="font-size:11px;color:var(--tm);margin-top:1px;">Group related notes under a topic</div>
      </div>
      <button class="ibtn" onclick="closeNoteSectionDialog()" style="padding:4px;">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="var(--tm)" stroke-width="1.6"><path d="M4 4l8 8M12 4l-8 8"/></svg>
      </button>
    </div>

    <!-- Quick Add Section -->
    <div id="ns-quick-add-area" style="padding:14px 20px;border-bottom:1px solid var(--border);background:#FAFCFE;">
      <div style="display:flex;align-items:center;gap:5px;margin-bottom:8px;">
        <svg width="12" height="12" viewBox="0 0 14 14" fill="none" stroke="var(--amber)" stroke-width="1.5"><circle cx="7" cy="7" r="5.5"/><path d="M7 4.5v5M4.5 7h5"/></svg>
        <span style="font-size:11px;font-weight:600;color:var(--tp);">Quick Add</span>
        <span style="font-size:10px;color:var(--td);margin-left:2px;">— click to instantly add</span>
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;">
        <button onclick="quickAddFromModal('Safety Updates',this)" style="display:inline-flex;align-items:center;gap:4px;padding:5px 12px;border:1px solid var(--border);border-radius:14px;font-size:11px;font-weight:500;color:var(--tm);background:#fff;cursor:pointer;font-family:inherit;transition:all .12s;white-space:nowrap;"
                onmouseenter="this.style.borderColor='var(--amber)';this.style.color='var(--amber)';this.style.background='var(--amber-l)'"
                onmouseleave="this.style.borderColor='var(--border)';this.style.color='var(--tm)';this.style.background='#fff'">Safety Updates</button>
        <button onclick="quickAddFromModal('Visitor Log',this)" style="display:inline-flex;align-items:center;gap:4px;padding:5px 12px;border:1px solid var(--border);border-radius:14px;font-size:11px;font-weight:500;color:var(--tm);background:#fff;cursor:pointer;font-family:inherit;transition:all .12s;white-space:nowrap;"
                onmouseenter="this.style.borderColor='var(--amber)';this.style.color='var(--amber)';this.style.background='var(--amber-l)'"
                onmouseleave="this.style.borderColor='var(--border)';this.style.color='var(--tm)';this.style.background='#fff'">Visitor Log</button>
        <button onclick="quickAddFromModal('General Notes',this)" style="display:inline-flex;align-items:center;gap:4px;padding:5px 12px;border:1px solid var(--border);border-radius:14px;font-size:11px;font-weight:500;color:var(--tm);background:#fff;cursor:pointer;font-family:inherit;transition:all .12s;white-space:nowrap;"
                onmouseenter="this.style.borderColor='var(--amber)';this.style.color='var(--amber)';this.style.background='var(--amber-l)'"
                onmouseleave="this.style.borderColor='var(--border)';this.style.color='var(--tm)';this.style.background='#fff'">General Notes</button>
        <button onclick="quickAddFromModal('Site Conditions',this)" style="display:inline-flex;align-items:center;gap:4px;padding:5px 12px;border:1px solid var(--border);border-radius:14px;font-size:11px;font-weight:500;color:var(--tm);background:#fff;cursor:pointer;font-family:inherit;transition:all .12s;white-space:nowrap;"
                onmouseenter="this.style.borderColor='var(--amber)';this.style.color='var(--amber)';this.style.background='var(--amber-l)'"
                onmouseleave="this.style.borderColor='var(--border)';this.style.color='var(--tm)';this.style.background='#fff'">Site Conditions</button>
        <button onclick="quickAddFromModal('Equipment Notes',this)" style="display:inline-flex;align-items:center;gap:4px;padding:5px 12px;border:1px solid var(--border);border-radius:14px;font-size:11px;font-weight:500;color:var(--tm);background:#fff;cursor:pointer;font-family:inherit;transition:all .12s;white-space:nowrap;"
                onmouseenter="this.style.borderColor='var(--amber)';this.style.color='var(--amber)';this.style.background='var(--amber-l)'"
                onmouseleave="this.style.borderColor='var(--border)';this.style.color='var(--tm)';this.style.background='#fff'">Equipment Notes</button>
        <button onclick="quickAddFromModal('Environmental',this)" style="display:inline-flex;align-items:center;gap:4px;padding:5px 12px;border:1px solid var(--border);border-radius:14px;font-size:11px;font-weight:500;color:var(--tm);background:#fff;cursor:pointer;font-family:inherit;transition:all .12s;white-space:nowrap;"
                onmouseenter="this.style.borderColor='var(--amber)';this.style.color='var(--amber)';this.style.background='var(--amber-l)'"
                onmouseleave="this.style.borderColor='var(--border)';this.style.color='var(--tm)';this.style.background='#fff'">Environmental</button>
      </div>
    </div>

    <!-- Divider with "or" -->
    <div style="display:flex;align-items:center;gap:10px;padding:0 20px;margin:0;">
      <div style="flex:1;height:1px;background:var(--border);"></div>
      <span style="font-size:10px;font-weight:600;color:var(--td);text-transform:uppercase;letter-spacing:.08em;">or create custom</span>
      <div style="flex:1;height:1px;background:var(--border);"></div>
    </div>

    <!-- Body — Custom form -->
    <div style="padding:16px 20px 20px;">
      <label style="font-size:11px;font-weight:600;color:var(--tb);display:block;margin-bottom:5px;">Section Name <span style="color:var(--red);">*</span></label>
      <input id="ns-name-input" class="vi" placeholder="e.g. Safety Measure, Daily Progress" style="margin-bottom:12px;height:38px;">
      <label style="font-size:11px;font-weight:600;color:var(--tb);display:block;margin-bottom:5px;">Description <span style="color:var(--td);font-weight:400;">(optional)</span></label>
      <textarea id="ns-desc-input" class="vi" rows="2" placeholder="Brief description of this note section…" style="height:auto;padding:10px 12px;resize:vertical;"></textarea>
    </div>

    <!-- Footer -->
    <div style="display:flex;align-items:center;justify-content:flex-end;gap:8px;padding:12px 20px;border-top:1px solid var(--border);background:#FAFAFA;">
      <button class="btn btn-o" onclick="closeNoteSectionDialog()" style="font-size:12px;">Cancel</button>
      <button class="btn btn-a" id="ns-save-btn" onclick="saveNoteSection()" style="font-size:12px;gap:4px;">
        <svg width="10" height="10" viewBox="0 0 12 12" fill="none" stroke="white" stroke-width="2"><path d="M2 6l3 3 5-5"/></svg>
        Add Section
      </button>
    </div>
  </div>
</div>
