<!-- ── PHOTOS SECTION ── -->
<div class="sec" id="sec-photos">
  <div class="sec-head open" onclick="togSec(this)">
    <div class="sec-icon" style="background:#FEF3DC;">
      <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="var(--amber)" stroke-width="1.5"><rect x="1" y="3" width="14" height="10" rx="2"/><circle cx="5.5" cy="7.5" r="1.5"/><path d="M1 11l4-3.5 3 2.5 2.5-2L15 12"/></svg>
    </div>
    <div style="flex:1;"><div class="sec-ttl" style="color:var(--amber);">Photos</div></div>
    <!-- Search -->
    <div style="display:flex;align-items:center;gap:5px;border:1px solid var(--border);border-radius:6px;height:28px;padding:0 8px;background:#fff;margin-right:4px;" onclick="event.stopPropagation()">
      <svg width="11" height="11" viewBox="0 0 12 12" fill="none" stroke="#9CA3AF" stroke-width="1.5"><circle cx="5" cy="5" r="3.5"/><path d="M8 8l3 3"/></svg>
      <input id="photo-search" style="border:none;outline:none;font-size:11px;width:180px;font-family:inherit;color:var(--tb);" placeholder="Search Photos By Tags Or Description" oninput="filterPhotos(this.value)">
    </div>
    <span id="ss-photos" class="sstat empty" style="margin-right:4px;">0 photos</span>
    <button class="btn btn-a btn-sm" style="gap:4px;font-size:11px;" onclick="event.stopPropagation();openMo('upload-photos')">
      <svg width="10" height="10" viewBox="0 0 12 12" fill="none" stroke="white" stroke-width="2"><path d="M6 2v8M2 6h8"/></svg>
      ADD PHOTO
    </button>
    <svg class="chev open" width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" style="margin-left:6px;"><path d="M4 6l4 4 4-4"/></svg>
  </div>
  <div class="sec-body" id="body-photos">
    <div id="photo-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;min-height:60px;"></div>
    <div id="photos-empty" style="text-align:center;padding:48px 20px;">
      <div style="width:80px;height:80px;border-radius:50%;background:#F4F5F7;margin:0 auto 16px;display:flex;align-items:center;justify-content:center;">
        <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
          <rect x="4" y="8" width="28" height="20" rx="3" stroke="#D1D5DB" stroke-width="1.5" fill="none"/>
          <circle cx="12" cy="16" r="3" stroke="#D1D5DB" stroke-width="1.3" fill="none"/>
          <path d="M4 24l7-6 5 4 4-3 12 9" stroke="#D1D5DB" stroke-width="1.3" fill="none" stroke-linecap="round"/>
        </svg>
      </div>
      <div style="font-size:14px;font-weight:600;color:var(--tp);margin-bottom:4px;">There are no photos for this date.</div>
      <div style="font-size:12px;color:var(--tm);margin-bottom:12px;">Please start by adding one.</div>
      <button class="btn btn-a btn-sm" style="gap:4px;" onclick="openMo('upload-photos')">
        <svg width="10" height="10" viewBox="0 0 12 12" fill="none" stroke="white" stroke-width="2"><path d="M6 2v8M2 6h8"/></svg>
        Add Photos
      </button>
    </div>
  </div>
</div>
