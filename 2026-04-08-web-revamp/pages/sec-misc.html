<!-- ── MISCELLANEOUS SECTION ── -->
<div class="sec" id="sec-misc">
  <div class="sec-head" onclick="togSec(this)">
    <div class="sec-icon" style="background:#FFF7ED;">
      <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="var(--amber)" stroke-width="1.5"><rect x="2" y="2" width="12" height="12" rx="2"/><path d="M5 5h6M5 8h6M5 11h3"/></svg>
    </div>
    <div style="flex:1;"><div class="sec-ttl" style="color:var(--amber);">Miscellaneous</div></div>

    <!-- Compact stats -->
    <div style="display:flex;align-items:center;gap:14px;font-size:12px;color:var(--tm);margin-right:8px;" onclick="event.stopPropagation()">
      <span>Items <strong id="misc-stat-count" style="color:var(--tp);">0</strong></span>
      <span style="color:var(--border-d);">|</span>
      <span>Unassigned <strong id="misc-stat-unassigned" style="color:var(--amber);">0</strong></span>
    </div>

    <!-- Actions -->
    <div style="display:flex;align-items:center;gap:5px;" onclick="event.stopPropagation()">
      <div style="display:flex;align-items:center;gap:5px;border:1px solid var(--border);border-radius:6px;height:28px;padding:0 8px;background:#fff;">
        <svg width="11" height="11" viewBox="0 0 12 12" fill="none" stroke="#9CA3AF" stroke-width="1.5"><circle cx="5" cy="5" r="3.5"/><path d="M8 8l3 3"/></svg>
        <input id="misc-search" style="border:none;outline:none;font-size:11px;width:110px;font-family:inherit;color:var(--tb);" placeholder="Search…" oninput="renderMisc()">
      </div>
      <button class="btn btn-a btn-sm" style="gap:4px;font-size:11px;" onclick="openAddMisc()">
        <svg width="9" height="9" viewBox="0 0 12 12" fill="none" stroke="white" stroke-width="2"><path d="M6 2v8M2 6h8"/></svg>
        ADD ITEM
      </button>
    </div>

    <span id="ss-misc" class="sstat empty" style="margin-left:6px;">0 items</span>
    <svg class="chev" width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" style="margin-left:6px;"><path d="M4 6l4 4 4-4"/></svg>
  </div>

  <div class="sec-body dn" id="body-misc">
    <!-- Warning banner -->
    <div id="misc-warning-banner" style="display:none;align-items:flex-start;gap:10px;background:#FFFBEB;border:1px solid #FDE68A;border-radius:6px;padding:10px 14px;margin-bottom:12px;">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="#D97706" stroke-width="1.4" style="flex-shrink:0;margin-top:1px;"><path d="M8 2L1.5 13.5h13L8 2z"/><path d="M8 6.5v3.5"/><circle cx="8" cy="11.5" r=".5" fill="#D97706"/></svg>
      <span style="font-size:12px;color:#92400E;line-height:1.5;">Some entries haven't been assigned to any task or cost centre. Please review it under unassigned tab in daily cost tracking.</span>
    </div>

    <!-- Table -->
    <div style="overflow-x:auto;border:1px solid var(--border);border-radius:6px;">
      <table class="vt" style="min-width:100%;">
        <thead>
          <tr style="background:var(--thead);">
            <th style="width:28px;background:var(--thead);"></th>
            <th style="text-align:left;min-width:140px;font-size:12px;font-weight:600;color:var(--tb);">Name</th>
            <th style="text-align:left;width:140px;font-size:12px;font-weight:600;color:var(--tb);">Task</th>
            <th style="text-align:left;width:140px;font-size:12px;font-weight:600;color:var(--tb);">Cost Centre</th>
            <th style="text-align:center;width:80px;font-size:12px;font-weight:600;color:var(--tb);">Quantity</th>
            <th style="text-align:center;width:90px;font-size:12px;font-weight:600;color:var(--tb);">Duration</th>
            <th style="text-align:center;width:90px;font-size:12px;font-weight:600;color:var(--tb);">Total Hours</th>
            <th style="text-align:center;width:80px;font-size:12px;font-weight:600;color:var(--tb);">Attachments</th>
          </tr>
        </thead>
        <tbody id="misc-tbody"></tbody>
      </table>
    </div>

  </div>
</div>
