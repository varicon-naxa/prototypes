<!-- ── DELIVERY DOCKETS SECTION ── -->
<div class="sec" id="sec-delivery">
  <div class="sec-head" onclick="togSec(this)">
    <div class="sec-icon" style="background:#EDE9FE;">🚛</div>
    <div style="flex:1;"><div class="sec-ttl" style="color:var(--amber);">Delivery Dockets</div></div>
    <span id="ss-del" class="sstat empty">0 dockets</span>
    <button class="btn btn-a btn-sm" style="margin-left:8px;" onclick="event.stopPropagation();addDelRow()"><svg width="10" height="10" viewBox="0 0 12 12" fill="none" stroke="white" stroke-width="2"><path d="M6 2v8M2 6h8"/></svg> ADD DOCKET</button>
    <svg class="chev" width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" style="margin-left:8px;"><path d="M4 6l4 4 4-4"/></svg>
  </div>
  <div class="sec-body dn" id="body-delivery">
    <div id="del-rows"></div>
    <button class="add-row-btn" onclick="addDelRow()"><svg width="12" height="12" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="2"><path d="M6.5 2v9M2 6.5h9"/></svg> Add Delivery Row</button>
  </div>
</div>
