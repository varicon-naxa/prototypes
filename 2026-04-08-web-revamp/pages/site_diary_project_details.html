{# Map + location — project identity rows live in site_diary_redesign.html header. #}
{% if project_details.latitude and project_details.longitude %}
<div class="section sd-r-section">
  <div class="section-header">
    <h2>Site location</h2>
  </div>
  <div class="sd-map-frame">
    <iframe
      src="https://www.google.com/maps?q={{ project_details.latitude }},{{ project_details.longitude }}&z=17&output=embed"
      width="100%"
      height="320"
      style="border: 0"
      allowfullscreen=""
      loading="lazy"
      referrerpolicy="no-referrer-when-downgrade"
    ></iframe>
  </div>
</div>
{% endif %}
