<!-- ── NOTES SECTION ── -->
<div class="sec" id="sec-notes">
  <div class="sec-head open" onclick="togSec(this)">
    <div class="sec-icon" style="background:#FEF3DC;">
      <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="var(--amber)" stroke-width="1.5"><rect x="2" y="1" width="12" height="14" rx="2"/><path d="M5 5h6M5 8h6M5 11h3"/></svg>
    </div>
    <div style="flex:1;"><div class="sec-ttl" style="color:var(--amber);">Notes</div></div>
    <!-- Search -->
    <div style="display:flex;align-items:center;gap:5px;border:1px solid var(--border);border-radius:6px;height:28px;padding:0 8px;background:#fff;margin-right:4px;" onclick="event.stopPropagation()">
      <svg width="11" height="11" viewBox="0 0 12 12" fill="none" stroke="#9CA3AF" stroke-width="1.5"><circle cx="5" cy="5" r="3.5"/><path d="M8 8l3 3"/></svg>
      <input id="notes-search" style="border:none;outline:none;font-size:11px;width:120px;font-family:inherit;color:var(--tb);" placeholder="Search notes…" oninput="filterNotes(this.value)">
    </div>
    <!-- Copy from Previous -->
    <button class="btn btn-o btn-sm" style="gap:4px;font-size:11px;" onclick="event.stopPropagation();copyFromPrevious()">
      <svg width="11" height="11" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4"><rect x="4" y="4" width="8" height="8" rx="1.5"/><path d="M4 10H3a1.5 1.5 0 01-1.5-1.5v-6A1.5 1.5 0 013 1h6A1.5 1.5 0 0110.5 2.5V4"/></svg>
      Copy from Previous
    </button>
    <!-- Audit Logs -->
    <button class="btn btn-o btn-sm" style="gap:4px;margin-left:3px;font-size:11px;" onclick="event.stopPropagation();openAuditPanel()">
      <svg width="11" height="11" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M2 10V6M5 10V4M8 10V2M11 10V7"/></svg>
      Audit Logs
    </button>
    <!-- Manage Note Sections -->
    <button class="btn btn-a btn-sm" style="gap:4px;margin-left:3px;font-size:11px;" onclick="event.stopPropagation();openManageNoteSections()">
      <svg width="10" height="10" viewBox="0 0 12 12" fill="none" stroke="white" stroke-width="1.8"><path d="M2 3h8M2 6h8M2 9h8"/></svg>
      MANAGE NOTE SECTIONS
    </button>
    <span id="ss-notes" class="sstat empty" style="margin-left:6px;">0 notes</span>
    <svg class="chev open" width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" style="margin-left:6px;"><path d="M4 6l4 4 4-4"/></svg>
  </div>
  <div class="sec-body" id="body-notes">
    <div id="notes-sections-container"></div>

    <!-- Empty state -->
    <div id="notes-empty-state" style="text-align:center;padding:48px 20px;">
      <div style="width:80px;height:80px;border-radius:50%;background:#FEF3DC;margin:0 auto 16px;display:flex;align-items:center;justify-content:center;">
        <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
          <rect x="8" y="4" width="20" height="28" rx="3" stroke="#F5A623" stroke-width="1.5" fill="none"/>
          <path d="M13 12h10M13 17h10M13 22h6" stroke="#F5A623" stroke-width="1.3" stroke-linecap="round" opacity=".6"/>
          <circle cx="27" cy="27" r="7" fill="#FEF3DC" stroke="#F5A623" stroke-width="1.3"/>
          <path d="M24.5 27h5M27 24.5v5" stroke="#F5A623" stroke-width="1.3" stroke-linecap="round"/>
        </svg>
      </div>
      <div style="font-size:14px;font-weight:600;color:var(--tp);margin-bottom:4px;">No notes available</div>
      <div style="font-size:12px;color:var(--tm);line-height:1.5;">To add a new note section, click on <button onclick="openManageNoteSections()" style="background:none;border:none;color:var(--amber);font-weight:600;font-size:12px;cursor:pointer;font-family:inherit;text-decoration:underline;">Manage Note Sections</button></div>
    </div>
  </div>
</div>
