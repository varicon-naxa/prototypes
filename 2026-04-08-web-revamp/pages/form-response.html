<!-- ────────── FORM RESPONSE PAGE (Add Response — full page) ────────── -->
<div id="pg-form-response" class="vp" style="overflow:auto;padding:0;">
  <!-- Response Header -->
  <div style="background:#fff;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 22px;height:52px;flex-shrink:0;">
    <button class="ibtn" onclick="goPage('assigned-forms')" style="margin-right:6px;">
      <svg width="13" height="13" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 2L4 7L9 12"/></svg>
    </button>
    <span style="font-size:15px;font-weight:600;color:var(--tp);">Add Response</span>
    <div style="margin-left:auto;display:flex;align-items:center;gap:8px;">
      <button class="btn btn-o" onclick="goPage('assigned-forms')">CANCEL</button>
      <button class="btn btn-a" onclick="showToast('Form submitted successfully!');goPage('form-submissions')">SUBMIT</button>
    </div>
  </div>

  <!-- Form Content -->
  <div style="flex:1;overflow-y:auto;padding:24px 28px;background:var(--bg);">
    <div style="max-width:680px;">
      <h3 id="fr-title" style="font-size:18px;font-weight:600;color:var(--tp);margin-bottom:24px;">Pre Start with Equip with Photo</h3>

      <!-- Equipment Field -->
      <div class="f-field">
        <label>Equipment *</label>
        <div style="position:relative;">
          <select class="vs" id="fr-equip" style="width:100%;height:40px;font-size:13px;">
            <option value="">Select equipment…</option>
            <option selected>4440 Boston Dozer</option>
            <option>55T Excavator</option>
            <option>Motor Grader</option>
            <option>Backhoe Loader</option>
            <option>Dump Truck</option>
            <option>Eicher Tractor</option>
            <option>Concrete Mixer</option>
          </select>
        </div>
      </div>

      <!-- Meter Field -->
      <div class="f-field">
        <label>Meter</label>
        <input class="vi" type="number" value="6" style="height:40px;">
      </div>

      <!-- Photo Field -->
      <div class="f-field">
        <label>Photo of Meter Reading</label>
        <div class="photo-attach" onclick="showToast('Photo upload opened')">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="3" width="14" height="10" rx="1"/><circle cx="5.5" cy="6.5" r="1.5"/><path d="M1 10l3.5-3 3 2.5L10 7l5 5"/></svg>
          Add photo of Meter Reading
        </div>
      </div>
    </div>
  </div>
</div>
