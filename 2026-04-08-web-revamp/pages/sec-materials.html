<!-- ── MATERIALS SECTION ── -->
<div class="sec" id="sec-materials">
  <div class="sec-head" onclick="togSec(this)">
    <div class="sec-icon" style="background:#FEF3DC;">
      <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="var(--amber)" stroke-width="1.5"><rect x="1" y="5" width="14" height="9" rx="1.5"/><path d="M5 5V3.5A1.5 1.5 0 016.5 2h3A1.5 1.5 0 0111 3.5V5"/><path d="M1 9h14"/></svg>
    </div>
    <div style="flex:1;"><div class="sec-ttl" style="color:var(--amber);">Materials</div></div>

    <!-- Compact stats -->
    <div style="display:flex;align-items:center;gap:14px;font-size:12px;color:var(--tm);margin-right:8px;" onclick="event.stopPropagation()">
      <span>Materials <strong id="mat-stat-count" style="color:var(--tp);">0</strong></span>
      <span style="color:var(--border-d);">|</span>
      <span>Unassigned <strong id="mat-stat-unassigned" style="color:var(--amber);">0</strong></span>
    </div>

    <!-- Action bar -->
    <div style="display:flex;align-items:center;gap:5px;" onclick="event.stopPropagation()">
      <!-- Search -->
      <div style="display:flex;align-items:center;gap:5px;border:1px solid var(--border);border-radius:6px;height:28px;padding:0 8px;background:#fff;">
        <svg width="11" height="11" viewBox="0 0 12 12" fill="none" stroke="#9CA3AF" stroke-width="1.5"><circle cx="5" cy="5" r="3.5"/><path d="M8 8l3 3"/></svg>
        <input id="mat-search" style="border:none;outline:none;font-size:11px;width:110px;font-family:inherit;color:var(--tb);" placeholder="Search materials…" oninput="renderMat()">
      </div>
      <button class="btn btn-o btn-sm" style="gap:4px;font-size:11px;" onclick="openMatTaskModal()">
        <svg width="9" height="9" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2v8M2 6h8"/></svg>
        TASKS/COST CENTRES
      </button>
      <button class="btn btn-a btn-sm" style="gap:4px;font-size:11px;" onclick="openAddMaterial()">
        <svg width="9" height="9" viewBox="0 0 12 12" fill="none" stroke="white" stroke-width="2"><path d="M6 2v8M2 6h8"/></svg>
        ADD MATERIAL
      </button>
    </div>

    <span id="ss-mat" class="sstat empty" style="margin-left:6px;">0 items</span>
    <svg class="chev" width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" style="margin-left:6px;"><path d="M4 6l4 4 4-4"/></svg>
  </div>

  <div class="sec-body dn" id="body-materials">
    <!-- Warning banner (shown when unassigned qty > 0) -->
    <div id="mat-warning-banner" style="display:none;align-items:flex-start;gap:10px;background:#FFFBEB;border:1px solid #FDE68A;border-radius:6px;padding:10px 14px;margin-bottom:12px;">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="#D97706" stroke-width="1.4" style="flex-shrink:0;margin-top:1px;"><path d="M8 2L1.5 13.5h13L8 2z"/><path d="M8 6.5v3.5"/><circle cx="8" cy="11.5" r=".5" fill="#D97706"/></svg>
      <span style="font-size:12px;color:#92400E;line-height:1.5;">Some entries haven't been assigned to any task or cost centre in materials. Please review it under unassigned tab in daily cost tracking.</span>
    </div>

    <!-- Table wrapper -->
    <div style="overflow-x:auto;border:1px solid var(--border);border-radius:6px;">
      <table class="vt" style="min-width:100%;border-radius:6px;overflow:hidden;">
        <thead id="mat-thead">
          <tr>
            <th style="width:28px;background:var(--thead);"></th>
            <th style="text-align:left;background:var(--thead);">Material</th>
            <th style="text-align:left;width:110px;background:var(--thead);">Source</th>
            <th style="text-align:left;width:130px;background:var(--thead);">Company / Supplier</th>
            <th style="text-align:center;width:120px;background:var(--thead);">Total Qty</th>
            <th style="text-align:center;width:120px;background:var(--thead);border-right:2px solid var(--border-d);">Unassigned Qty</th>
          </tr>
        </thead>
        <tbody id="mat-tbody">
          <!-- Empty state injected by renderMat() -->
        </tbody>
      </table>
    </div>

  </div>
</div>
