<!-- ────────── PROJECTS PAGE ────────── -->
<div id="pg-proj" class="vp on" style="overflow:auto;padding:20px 24px;">
  <div style="display:flex;gap:0;border-bottom:2px solid var(--border);margin-bottom:16px;">
    <div class="stab on" onclick="swStab(this)">PROJECT</div>
    <div class="stab" onclick="swStab(this)">DRAFT</div>
  </div>
  <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap;">
    <button class="btn btn-o" style="font-size:12px;cursor:default;">
      <svg width="11" height="11" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="1" width="10" height="10" rx="1"/><path d="M4 6h4M3 4h6"/></svg>
      Mon 02/10/2023 – Mon 02/12/2025 ▾
    </button>
    <button class="btn btn-o">
      <svg width="11" height="11" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1 3h10M2.5 6.5h7M4.5 10h3"/></svg>
      Filters
    </button>
    <button class="btn btn-o" style="color:var(--red);">✕ Clear Filters</button>
    <div style="flex:1;"></div>
    <input class="vi" style="width:200px;" placeholder="Search projects…" oninput="searchProjects(this.value)">
    <button class="btn btn-a btn-xl" onclick="showToast('Add Project')">
      <svg width="11" height="11" viewBox="0 0 12 12" fill="none" stroke="white" stroke-width="2"><path d="M6 2v8M2 6h8"/></svg>
      Add Project
    </button>
  </div>
  <div class="card" style="overflow:hidden;">
    <table class="vt">
      <thead>
        <tr>
          <th style="width:28px;"><input type="checkbox"></th>
          <th style="width:24px;"></th>
          <th>Job Number</th>
          <th>Project Name</th>
          <th>Type</th>
          <th>Status</th>
          <th>Start Date</th>
          <th>Completion Date</th>
          <th style="width:36px;"></th>
        </tr>
      </thead>
      <tbody id="proj-tbody">
        <!-- Rendered dynamically by js/projects.js -->
      </tbody>
    </table>
    <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 16px;font-size:12px;color:var(--tm);border-top:1px solid var(--border);">
      <span>Rows per page:
        <select class="vs" style="width:55px;margin-left:4px;" onchange="projRowsPerPage=parseInt(this.value);projCurrentPage=1;renderProjects();">
          <option>15</option>
          <option>30</option>
        </select>
      </span>
      <span id="proj-page-info">1–7 of 7</span>
      <div style="display:flex;gap:4px;">
        <button class="ibtn" onclick="projPageNav(-1)">‹</button>
        <button class="ibtn" onclick="projPageNav(1)">›</button>
      </div>
    </div>
  </div>
</div>
