<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Site Diary — Choose View</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0e0f0d;
      --surface:  #161714;
      --border:   #2a2b28;
      --accent:   #d4a853;
      --accent2:  #7ec8a0;
      --text:     #e8e6e0;
      --muted:    #6b6a65;
      --card-h:   320px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
    }

    /* Noise grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.03;
      pointer-events: none;
      z-index: 999;
    }

    /* Grid lines background */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(212,168,83,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(212,168,83,0.04) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      gap: 56px;
    }

    /* Header */
    .header {
      text-align: center;
      animation: fadeUp 0.7s ease both;
    }

    .label {
      font-size: 10px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 12px;
    }

    .title {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(40px, 7vw, 72px);
      line-height: 1.0;
      color: var(--text);
      letter-spacing: -0.02em;
    }

    .title em {
      font-style: italic;
      color: var(--accent);
    }

    .subtitle {
      margin-top: 14px;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    /* Cards */
    .cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      width: 100%;
      max-width: 720px;
      animation: fadeUp 0.7s 0.15s ease both;
    }

    .card {
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      height: var(--card-h);
      padding: 32px;
      background: var(--surface);
      border: 1px solid var(--border);
      text-decoration: none;
      color: var(--text);
      overflow: hidden;
      cursor: pointer;
      transition: border-color 0.25s, transform 0.25s;
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .card--mobile::before {
      background: radial-gradient(ellipse at 20% 80%, rgba(212,168,83,0.12) 0%, transparent 60%);
    }

    .card--web::before {
      background: radial-gradient(ellipse at 80% 20%, rgba(126,200,160,0.12) 0%, transparent 60%);
    }

    .card:hover {
      border-color: var(--accent);
      transform: translateY(-3px);
    }

    .card--web:hover {
      border-color: var(--accent2);
    }

    .card:hover::before {
      opacity: 1;
    }

    /* Corner accent line */
    .card::after {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 40px; height: 2px;
      background: var(--accent);
      transition: width 0.3s;
    }

    .card--web::after {
      background: var(--accent2);
    }

    .card:hover::after {
      width: 100%;
    }

    .card-top {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .card-tag {
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .card--web .card-tag {
      color: var(--accent2);
    }

    .card-name {
      font-family: 'DM Serif Display', serif;
      font-size: 32px;
      line-height: 1.1;
      color: var(--text);
    }

    .card-desc {
      font-size: 11px;
      color: var(--muted);
      line-height: 1.7;
      margin-top: 8px;
    }

    /* Device illustration */
    .card-illustration {
      display: flex;
      justify-content: center;
      align-items: flex-end;
      flex: 1;
      padding-top: 16px;
    }

    .device-mobile {
      width: 52px;
      height: 88px;
      border: 2px solid var(--border);
      border-radius: 8px;
      position: relative;
      transition: border-color 0.25s;
    }

    .card:hover .device-mobile {
      border-color: var(--accent);
    }

    .device-mobile::before {
      content: '';
      position: absolute;
      top: 8px; left: 50%;
      transform: translateX(-50%);
      width: 14px; height: 2px;
      background: var(--border);
      border-radius: 2px;
      transition: background 0.25s;
    }

    .card:hover .device-mobile::before {
      background: var(--accent);
    }

    .device-mobile::after {
      content: '';
      position: absolute;
      bottom: 6px; left: 50%;
      transform: translateX(-50%);
      width: 12px; height: 12px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      transition: border-color 0.25s;
    }

    .card:hover .device-mobile::after {
      border-color: var(--accent);
    }

    .device-web {
      width: 100px;
      height: 70px;
      border: 2px solid var(--border);
      border-radius: 4px;
      position: relative;
      transition: border-color 0.25s;
    }

    .card--web:hover .device-web {
      border-color: var(--accent2);
    }

    .device-web::before {
      content: '';
      position: absolute;
      top: -1px; left: -1px; right: -1px;
      height: 14px;
      background: var(--border);
      border-radius: 2px 2px 0 0;
      transition: background 0.25s;
    }

    .card--web:hover .device-web::before {
      background: var(--accent2);
    }

    .device-web::after {
      content: '';
      position: absolute;
      bottom: -10px; left: 50%;
      transform: translateX(-50%);
      width: 30px; height: 10px;
      border-left: 2px solid var(--border);
      border-right: 2px solid var(--border);
      border-bottom: 2px solid var(--border);
      transition: border-color 0.25s;
    }

    .card--web:hover .device-web::after {
      border-color: var(--accent2);
    }

    .card-arrow {
      position: absolute;
      bottom: 28px;
      right: 28px;
      width: 32px;
      height: 32px;
      border: 1px solid var(--border);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.25s, background 0.25s, transform 0.25s;
    }

    .card:hover .card-arrow {
      border-color: var(--accent);
      background: var(--accent);
      transform: rotate(45deg);
    }

    .card--web:hover .card-arrow {
      border-color: var(--accent2);
      background: var(--accent2);
    }

    .card-arrow svg {
      width: 12px; height: 12px;
      stroke: var(--muted);
      transition: stroke 0.25s;
    }

    .card:hover .card-arrow svg {
      stroke: var(--bg);
    }

    /* Footer */
    .footer {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-align: center;
      animation: fadeUp 0.7s 0.3s ease both;
    }

    /* Animations */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 520px) {
      .cards {
        grid-template-columns: 1fr;
      }
      :root { --card-h: 240px; }
    }
  </style>
</head>
<body>
  <div class="wrapper">

    <header class="header">
      <p class="label">Prototype Viewer</p>
      <h1 class="title">Site <em>Diary</em></h1>
      <p class="subtitle">Choose your interface</p>
    </header>

    <div class="cards">

      <!-- Mobile -->
      <a class="card card--mobile" href="standard.html">
        <div class="card-top">
          <span class="card-tag">01 — Field</span>
          <h2 class="card-name">Mobile<br>View</h2>
          <p class="card-desc">Optimised for on-site use.<br>Touch-first interactions.</p>
        </div>
        <div class="card-illustration">
          <div class="device-mobile"></div>
        </div>
        <div class="card-arrow">
          <svg viewBox="0 0 12 12" fill="none" stroke-width="1.5">
            <path d="M2 10L10 2M10 2H4M10 2v6"/>
          </svg>
        </div>
      </a>

      <!-- Web -->
      <a class="card card--web" href="notes.html">
        <div class="card-top">
          <span class="card-tag">02 — Office</span>
          <h2 class="card-name">Web<br>View</h2>
          <p class="card-desc">Full-featured desktop layout.<br>Reports &amp; management.</p>
        </div>
        <div class="card-illustration">
          <div class="device-web"></div>
        </div>
        <div class="card-arrow">
          <svg viewBox="0 0 12 12" fill="none" stroke-width="1.5">
            <path d="M2 10L10 2M10 2H4M10 2v6"/>
          </svg>
        </div>
      </a>

    </div>

    <footer class="footer">Site Diary Report &nbsp;·&nbsp; Prototype</footer>

  </div>
</body>
</html>
